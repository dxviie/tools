      // ── Background: pixel grid + chromatic aberration ──────────────────────
      function drawBackground(g, W, H) {
        g.background(8, 10, 22);
        g.noStroke();

        const tile = 28;
        const cols = Math.ceil(W / tile) + 1;
        const rows = Math.ceil(H / tile) + 1;

        const offsets = [
          { r: 255, gr: 30,  bl: 40,  dx:  3, dy: -2, a: 120 }, // red layer
          { r: 20,  gr: 220, bl: 200, dx:  0, dy:  0, a: 150 }, // cyan layer
          { r: 180, gr: 80,  bl: 255, dx: -3, dy:  2, a: 80  }, // purple layer
        ];

        for (const ch of offsets) {
          for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
              const nx = col * 0.045, ny = row * 0.045;
              const n = p.noise(nx, ny, ch.r * 0.01);
              const n2 = p.noise(nx + 50, ny + 50);
              const bri = p.map(n, 0, 1, 0, 1);
              const presence = p.map(n2, 0, 1, 0, 1);
              if (bri * presence < 0.18) continue;
              const alpha = p.map(bri * presence, 0.18, 1, 20, ch.a);
              g.fill(ch.r, ch.gr, ch.bl, alpha);
              g.rect(col * tile + ch.dx, row * tile + ch.dy, tile - 2, tile - 2);
            }
          }
        }

        // subtle scanlines
        for (let y = 0; y < H; y += 2) {
          g.fill(0, 0, 0, 18);
          g.rect(0, y, W, 1);
        }
      }

      // ── Info box ───────────────────────────────────────────────────────────
      // bx/by = bottom-right corner of the box
      function drawInfoBox(g, lines, bx, by) {
        g.textFont('Space Mono');
        g.textSize(46);
        g.textStyle(p.NORMAL);

        const pad = 36, lineH = 64;
        let boxW = 0;
        for (const l of lines) boxW = Math.max(boxW, g.textWidth(l));
        boxW += pad * 2;
        const boxH = lines.length * lineH + pad;

        const rx = bx - boxW, ry = by - boxH;

        g.fill(8, 10, 22, 200);
        g.noStroke();
        g.rect(rx, ry, boxW, boxH, 6);

        g.fill(180, 200, 220);
        g.textAlign(p.LEFT, p.TOP);
        lines.forEach((l, i) => {
          g.text(l, rx + pad, ry + pad * 0.6 + i * lineH);
        });
        return { rx, ry, boxW, boxH };
      }

      // ── Main draw ──────────────────────────────────────────────────────────
      function render() {
        const W = square ? SW : WW;
        const H = square ? SH : WH;
        pg = p.createGraphics(W, H);
        pg.pixelDensity(1);
        p.noiseSeed(42);

        drawBackground(pg, W, H);

        const margin = 80;
        // Logo dimensions (original: 1620×600, aspect ≈ 2.7:1)
        const logoW = 380;
        const logoH = Math.round(logoW * 600 / 1620); // ≈ 141
        const logoX = W - margin - logoW;
        // Info box height: 3 lines × 64 + 36 padding (matches drawInfoBox formula)
        const infoBoxH = 3 * 64 + 36;
        const logoY = H - margin - infoBoxH - 20 - logoH;

        // ── Title area (top-left) ─────────────────────────────────────────
        if (variant === 1) {
          pg.textFont('Space Mono');
          pg.textStyle(p.NORMAL);
          pg.textAlign(p.LEFT, p.TOP);

          pg.fill(255);
          pg.textSize(140);
          pg.text('image', margin, margin);
          pg.text('manipulation', margin, margin + 148);

          pg.fill(100, 210, 200);
          pg.textSize(96);
          pg.text('workshop', margin, margin + 148 + 156);

          pg.textSize(60);
          pg.fill(180, 180, 180);
          pg.text('with Adam Driggers', margin, margin + 148 + 156 + 110);
          pg.fill(100, 210, 200);
          pg.text('(@driggs)', margin, margin + 148 + 156 + 110 + 72);

        } else {
          pg.textFont('Space Mono');
          pg.textStyle(p.NORMAL);
          pg.textAlign(p.LEFT, p.TOP);

          pg.fill(255);
          pg.textSize(140);
          pg.text('sunday', margin, margin);
          pg.text('session', margin, margin + 148);

          pg.fill(100, 210, 200);
          pg.textSize(72);
          pg.text('co-working + show & tell', margin, margin + 148 + 160);
        }

        // ── Info box (below logo) ─────────────────────────────────────────
        const box = drawInfoBox(pg, ['@ A LAB', '13:00 – 17:00', '22/03/2026'], W - margin, H - margin);

        // ── CCA logo centered above info box ─────────────────────────────
        const centeredLogoX = box.rx + (box.boxW - logoW) / 2;
        pg.image(logo, centeredLogoX, logoY, logoW, logoH);

        // ── Copy to display canvas ────────────────────────────────────────
        p.image(pg, 0, 0, p.width, p.height);
      }

      p.setup = function() {
        const cnv = p.createCanvas(1200, 675);
        cnv.parent(document.body);
        p.noLoop();
        render();
      };

      p.draw = function() {
        if (square) {
          p.resizeCanvas(675, 675);
        } else {
          p.resizeCanvas(1200, 675);
        }
        render();
      };

      window.redraw = () => p.redraw();
    });
